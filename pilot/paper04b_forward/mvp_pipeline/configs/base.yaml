# MVP Pipeline Base Configuration
# Paper-04b §4.0.1 E-D baseline
# FROZEN: 2026-04-18 - voxel_size must match MCX JSON LengthUnit

# CRITICAL: This voxel_size MUST match MCX JSON Domain.LengthUnit
# Atlas original: 0.1mm, downsampled 2x -> 0.2mm
voxel_size_mm: 0.2

# Atlas volume path (relative to project root)
# Generated by: uv run python scripts/step0f_mcx_volume.py
atlas_volume: output/shared/mcx_volume_trunk.bin
atlas_material: output/shared/mcx_material.yaml

# Geometry
geometry:
  detector_resolution: [256, 256]
  fov_mm: 40.0
  camera_distance_mm: 80.0

# MCX simulation
mcx:
  photons_dev: 100000000    # 1e8 for fast iteration
  photons_gt: 1000000000    # 1e9 for ground truth
  exe: /mnt/f/win-pro/bin/mcx.exe

# Views (M3/M4 minimum constraint)
views:
  angles: [0, 90, -90, 180]

# Optical parameters (soft_tissue NIR-II)
optical:
  mu_a: 0.087        # mm^-1, absorption coefficient
  mus_p: 4.3         # mm^-1, reduced scattering coefficient  
  g: 0.9             # anisotropy factor
  n: 1.37            # refractive index

# Source defaults (normalized to total power = 1)
source_defaults:
  alpha: 1.0
  ball_radius_mm: 2.0
  gaussian_sigma_mm: 1.0

# Position (P1-dorsal baseline)
position:
  name: "P1-dorsal"
  y_mm: 10.0
  depth_mm: 4.0      # source depth below dorsal surface

# Output
output:
  results_dir: "pilot/paper04b_forward/mvp_pipeline/results"
