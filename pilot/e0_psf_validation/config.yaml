# PSF Validation Experiment Configuration
# 验证解析 Green's function 与 MCX 蒙特卡洛的一致性

# 组织光学参数
tissue_params:
  muscle:
    mu_a: 0.087      # 吸收系数 (mm^-1)
    mu_sp: 4.291     # 约化散射系数 (mm^-1)
    g: 0.90          # 各向异性因子
    n: 1.37          # 折射率

  liver:
    mu_a: 0.352      # 吸收系数 (mm^-1)
    mu_sp: 6.781     # 约化散射系数 (mm^-1)
    g: 0.90          # 各向异性因子
    n: 1.37          # 折射率

# 仿真参数
simulation_params:
  rho_max_mm: 15.0       # 最大径向距离 (mm)
  n_points: 500          # 采样点数
  voxel_size_mm: 0.1     # MCX 体素大小 (mm)
  vol_size_mm: [30, 30, 20]  # MCX 体积尺寸 (x, y, z) mm
  n_photons: 100000000   # MCX 光子数 (1e8)

# 实验矩阵
configs:
  # 匀质 Muscle 配置
  - id: C01
    depth_mm: 1.5
    tissue_type: muscle
    description: "Muscle at 1.5mm depth"

  - id: C02
    depth_mm: 3.0
    tissue_type: muscle
    description: "Muscle at 3.0mm depth"

  - id: C03
    depth_mm: 5.0
    tissue_type: muscle
    description: "Muscle at 5.0mm depth"

  # 匀质 Liver 配置
  - id: C04
    depth_mm: 1.5
    tissue_type: liver
    description: "Liver at 1.5mm depth"

  - id: C05
    depth_mm: 3.0
    tissue_type: liver
    description: "Liver at 3.0mm depth"

  - id: C06
    depth_mm: 5.0
    tissue_type: liver
    description: "Liver at 5.0mm depth"

  # 双层配置 (1mm skin + liver)
  # 注: 解析 Green's function 假设匀质，双层配置误差会更大
  - id: C07
    depth_mm: 1.5
    tissue_type: bilayer
    description: "Bilayer (1mm skin + liver) at 1.5mm depth"

  - id: C08
    depth_mm: 3.0
    tissue_type: bilayer
    description: "Bilayer (1mm skin + liver) at 3.0mm depth"

  - id: C09
    depth_mm: 5.0
    tissue_type: bilayer
    description: "Bilayer (1mm skin + liver) at 5.0mm depth"

# Go/No-Go 判定阈值
decision_thresholds:
  ncc_go: 0.90           # NCC > 0.90 判为 GO
  ncc_caution: 0.70      # NCC > 0.70 判为 CAUTION
  fwhm_ratio_go_min: 0.80   # FWHM ratio 在 [0.8, 1.2] 判为 GO
  fwhm_ratio_go_max: 1.20
  fwhm_ratio_caution_min: 0.70  # FWHM ratio 在 [0.7, 1.3] 判为 CAUTION
  fwhm_ratio_caution_max: 1.30