# Small uniform tumor sources (radius 1-2mm), 1-3 foci, 5 samples
# For validating multi-organ interface mesh with small focal tumors
_base_: "trunk_v2_20260421_161440.yaml"

dataset:
  num_samples: 5
  voxel_grid_roi_size_mm: 38.0
  experiment_name: "small_uniform_5samples"

tumor:
  source_type: "uniform"
  radius_range: [1.0, 2.0]   # Small sources: 1-2mm radius
  num_foci_distribution:
    1: 0.34
    2: 0.33
    3: 0.33
  depth_distribution:
    shallow: {range: [1.5, 3.5], weight: 0.35}
    medium:  {range: [3.5, 6.0], weight: 0.40}
    deep:    {range: [6.0, 8.0], weight: 0.25}
  min_foci_distance_abs: 2.0

quality_filter:
  enabled: true
  min_b_max: 0.001
  min_gt_nonzero_count: 5
  max_retries: 20

mesh:
  mesh_file: "output/shared/digimouse_trunk_mesh.npz"
