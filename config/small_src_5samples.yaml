# Experiment config: small tumor sources (radius 1-2mm), 1-3 foci
# For validating multi-organ interface mesh with small focal tumors

_base_: "config/default.yaml"

experiment_name: "small_src_5samples"

tumor:
  source_type: "gaussian"
  regions: ["dorsal", "lateral"]
  num_foci_distribution:
    1: 0.34
    2: 0.33
    3: 0.33
  shapes: ["sphere", "ellipsoid"]
  radius_range: [1.0, 2.0]   # Small sources: 1-2mm radius
  depth_range: [1.5, 8.0]
  depth_distribution:
    shallow: {range: [1.5, 3.5], weight: 0.35}
    medium:  {range: [3.5, 6.0], weight: 0.40}
    deep:    {range: [6.0, 8.0], weight: 0.25}
  min_inter_foci_distance_ratio: 1.5
  ellipsoid_axis_ratio: [1.2, 1.5]
  max_cluster_radius: 8.0
  min_foci_distance_abs: 2.0

dataset:
  num_samples: 5
  noise: null
  voxel_spacing: 0.2
  voxel_grid_roi_size_mm: 30.0
  output_path: "data/"
  experiment_name: "small_src_5samples"

mesh:
  tool: "iso2mesh"
  target_nodes: 10000
  surface_maxvol: 0.5
  deep_maxvol: 5.0
  roi_maxvol: 1.0
  output_path: "assets/mesh/"
  mesh_file: "output/shared/digimouse_trunk_mesh.npz"
