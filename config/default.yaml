# === 基础配置模板 ===
# 不要直接使用此文件生成数据。
# 复制为 config/experiment_name.yaml 后修改。

atlas:
  path: "/home/foods/pro/mcx_simulation/ct_data/atlas_380x992x208.hdr"
  voxel_size: 0.1

  # Digimouse has 22 tissue labels (0-21)
  # Mapping to our simplified tissue classes for FMT simulation
  # Key insight from label stats:
  #   - Labels 3-8, 10 = brain regions (small volumes, in head)
  #   - Label 11 = muscle (107K voxels, ventral)
  #   - Label 12 = fat (30K voxels)
  #   - Label 13 = cartilage (190K voxels)
  #   - Label 14 = tongue (149K voxels)
  #   - Labels 15-21 = major organs (various volumes)
  #   - Label 1 = skin (16.7M voxels, covers entire body)
  #   - Label 2 = skeleton/bone (1.2M voxels)
  # Tissue merge: unified with MCX classification (10 classes: 0-9)
  # Both DE and MCX use the same label system for consistency
  tissue_merge:
    # Background
    0: 0
    # Skin + muscle/fat/cartilage/tongue -> soft_tissue (label 1)
    1: 1   # skin
    11: 1  # muscle
    12: 1  # fat
    13: 1  # cartilage
    14: 1  # tongue
    # Skeleton -> bone (label 2)
    2: 2
    # Brain regions -> brain (label 3)
    3: 3
    4: 3   # medulla
    5: 3   # cerebellum
    6: 3   # olfactory_bulb
    7: 3   # external_brain
    8: 3   # striatum
    10: 3  # brain_other
    # Heart (label 4)
    9: 4
    # Stomach (label 5)
    15: 5
    # Spleen + pancreas -> abdominal (label 6)
    16: 6  # spleen
    17: 6  # pancreas
    # Liver (label 7)
    18: 7
    # Kidney + adrenal (label 8)
    19: 8  # kidney
    20: 8  # adrenal
    # Lung (label 9)
    21: 9

mesh:
  tool: "iso2mesh"
  target_nodes: 10000
  surface_maxvol: 0.5
  deep_maxvol: 5.0
  roi_maxvol: 1.0
  output_path: "assets/mesh/"
  # Path to mesh file (can be overridden for different atlases)
  mesh_file: "output/shared/digimouse_trunk_mesh.npz"

physics:
  model: "DE"
  n: 1.37

  # Optical parameters in mm^-1
  # Unified with MCX: 10 tissue classes (labels 0-9)
  tissues:
    background:
      label: 0
      mu_a: 0.0
      mu_s_prime: 0.0
      g: 1.0
      n: 1.0
    soft_tissue:
      label: 1
      mu_a: 0.08697
      mu_s_prime: 4.29071
      g: 0.90
      n: 1.37
    bone:
      label: 2
      mu_a: 0.05251
      mu_s_prime: 24.4153
      g: 0.9
      n: 1.37
    brain:
      label: 3
      mu_a: 0.03180
      mu_s_prime: 15.9590
      g: 0.9
      n: 1.37
    heart:
      label: 4
      mu_a: 0.065
      mu_s_prime: 22.4
      g: 0.9
      n: 1.38
    stomach:
      label: 5
      mu_a: 0.028
      mu_s_prime: 18.7
      g: 0.88
      n: 1.37
    abdominal:
      label: 6
      mu_a: 0.052
      mu_s_prime: 25.3
      g: 0.89
      n: 1.38
    liver:
      label: 7
      mu_a: 0.041
      mu_s_prime: 20.5
      g: 0.88
      n: 1.37
    kidney:
      label: 8
      mu_a: 0.038
      mu_s_prime: 19.2
      g: 0.89
      n: 1.37
    lung:
      label: 9
      mu_a: 0.022
      mu_s_prime: 35.7
      g: 0.86
      n: 1.38

tumor:
  source_type: "gaussian"   # "gaussian" or "uniform"
  regions: ["dorsal", "lateral"]
  num_foci_distribution:
    1: 0.30
    2: 0.35
    3: 0.35
  shapes: ["sphere", "ellipsoid"]
  radius_range: [2.0, 3.0]
  depth_range: [1.5, 8.0]
  depth_distribution:
    shallow: {range: [1.5, 3.5], weight: 0.35}
    medium:  {range: [3.5, 6.0], weight: 0.40}
    deep:    {range: [6.0, 8.0], weight: 0.25}
  min_inter_foci_distance_ratio: 1.5
  ellipsoid_axis_ratio: [1.2, 1.5]
  max_cluster_radius: 8.0
  min_foci_distance_abs: 3.0

dataset:
  num_samples: 50
  noise: null
  voxel_spacing: 0.2
  voxel_grid_roi_size_mm: 30.0
  output_path: "data/"
  experiment_name: "default"  # 子目录名，最终输出到 data/{experiment_name}/

quality_filter:
  enabled: true
  min_b_max: 0.001           # measurement_b 的最小 max 值
  min_gt_nonzero_frac: 0.001  # gt_nodes 非零节点占比下限
  min_gt_nonzero_count: 0     # gt_nodes 非零节点数下限（0=不检查）
  max_retries: 5             # 质量不过关时的重试次数

# === MCX 仿真配置 ===
mcx:
  # 输出文件路径
  volume_path: "output/shared/mcx_volume_trunk.bin"
  material_path: "output/shared/mcx_material.yaml"

  # 躯干裁剪参数（Y 方向，对应 anterior→posterior）
  # Y ∈ [34mm, 74mm] at 0.1mm/voxel → voxel index [340, 740) at 0.1mm/voxel → voxel index [300, 700]
  trunk_crop:
    y_start: 340
    y_end: 740

  # 下采样因子
  downsample_factor: 2

  # 体素大小（mm）- 原始 0.1mm，2× 下采样后 0.2mm
  voxel_size_mm: 0.2

  # 裁剪后体积起点在原始 atlas 中的物理偏移（mm）
  # Y offset: trunk crop y_start=340 voxel → 34mm atlas (y_end=740→74mm)
  trunk_offset_mm: [0, 34, 0]

  # MCX Dim（Z, Y, X 顺序）- 由脚本自动计算
  # 原始裁剪后 (X=380, Y=400, Z=208) → 2× 下采样后 (X=190, Y=200, Z=104)
  # MCX Dim = [104, 200, 190]
  volume_shape: [104, 200, 190]

  # 组织类别数量
  num_tissues: 10  # labels 0-9

  # MCX 简化组织映射 (原始 Digimouse label → MCX label)
  # 将 22 类原始组织合并为 10 类
  tissue_mapping:
    0: 0   # background
    1: 1   # skin → soft_tissue
    2: 2   # skeleton → bone
    3: 3   # brain
    4: 3   # medulla → brain
    5: 3   # cerebellum → brain
    6: 3   # olfactory_bulb → brain
    7: 3   # external_brain → brain
    8: 3   # striatum → brain
    9: 4   # heart
    10: 3  # brain_other → brain
    11: 1  # muscle → soft_tissue
    12: 1  # fat → soft_tissue
    13: 1  # cartilage → soft_tissue
    14: 1  # tongue → soft_tissue
    15: 5  # stomach
    16: 6  # spleen → abdominal
    17: 6  # pancreas → abdominal
    18: 7  # liver
    19: 8  # kidney
    20: 8  # adrenal → kidney
    21: 9  # lung

  # MCX label 名称和参数来源
  # param_source 指向 physics.tissues 中的组织名称
  tissue_classes:
    0: {name: background, param_source: background}
    1: {name: soft_tissue, param_source: soft_tissue}
    2: {name: bone, param_source: bone}
    3: {name: brain, param_source: brain}
    4: {name: heart, param_source: heart}
    5: {name: stomach, param_source: stomach}
    6: {name: abdominal, param_source: abdominal}
    7: {name: liver, param_source: liver}
    8: {name: kidney, param_source: kidney}
    9: {name: lung, param_source: lung}

# === TurntableCamera 视图配置 ===
view_config:
  # 旋转角度列表 (度)
  angles: [-90, -60, -30, 0, 30, 60, 90]

  # 体位: prone (俯卧, 背部肿瘤) 或 supine (仰卧, 腹部肿瘤)
  pose: prone

  # 相机到转台距离 (mm)
  camera_distance_mm: 200

  # 探测器分辨率 [宽, 高] (像素)
  detector_resolution: [256, 256]

  # 投影类型 (目前只支持 orthographic)
  projection_type: orthographic

  # 是否启用平台遮挡
  platform_occlusion: true

  # 视野范围 (mm, 覆盖鼠体最大截面)
  fov_mm: 80

  # 平台遮挡 Z 中心 (mm, 约等于鼠体高度一半)
  # 鼠体 Z 范围 [1.6, 20]，平台在腹侧 (prone) 或背侧 (supine)
  # 对于 prone，平台在低 Z 区，occlude Z < z_center
  platform_z_center: 4.0
